<div class="showcase-layout">
  <nav class="sidebar" aria-label="Section navigation">
    <div class="sidebar__header">
      <span class="sidebar__badge">Angular 21</span>
      <h2 class="sidebar__title">Performance<br />Patterns</h2>
      <p class="sidebar__desc">Anti-patterns &amp; best practices for modern Angular apps.</p>
    </div>

    <ul class="sidebar__nav" role="list">
      @for (section of sections; track section.id) {
        <li>
          <button
            class="nav-item"
            [class.nav-item--active]="activeSection() === section.id"
            (click)="scrollToSection(section.id)"
            [attr.aria-current]="activeSection() === section.id ? 'true' : null"
          >
            <span class="nav-item__index">{{ section.index | number: '2.0-0' }}</span>
            <span class="nav-item__text">
              <span class="nav-item__title">{{ section.title }}</span>
              <span class="nav-item__sub">{{ section.subtitle }}</span>
            </span>
          </button>
        </li>
      }
    </ul>

    <div class="sidebar__footer">
      <span class="sidebar__tech">Zone.js &bull; Signals &bull; RxJS 7</span>
    </div>
  </nav>

  <main class="content" role="main">
    <app-section-getter-vs-signal />
    <app-section-lazy-loading />
    <app-section-signal-readonly />
    <app-section-service-scope />
    <app-section-input-debounce />
    <app-section-track-for />
    <app-section-observable-cleanup />
    <app-section-shared-module-pattern />
    <app-section-defer-blocks />
    <app-section-on-push />
    <app-section-forms-strategy />
  </main>
</div>

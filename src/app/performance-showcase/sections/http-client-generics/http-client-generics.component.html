<section id="http-client-generics" class="section">
  <div class="section__header">
    <span class="section__number">25</span>
    <div>
      <h2 class="section__title">
        {{ 'sections.httpClientGenerics.title' | translate }}
        <span class="tag-pill tag-pill--cyan">{{ 'sections.httpClientGenerics.tag' | translate }}</span>
      </h2>
      <p class="section__desc" [innerHTML]="'sections.httpClientGenerics.description' | translate"></p>
    </div>
  </div>

  <div class="panel-grid">
    <div class="panel panel--anti">
      <div class="panel__header">
        <span class="panel__badge panel__badge--anti">&#10007; {{ 'sections.httpClientGenerics.panels.anti' | translate }}</span>
        <span class="panel__lang">TypeScript</span>
      </div>
      <pre class="code-block" [innerHTML]="codeAnti"></pre>
    </div>
    <div class="panel panel--best">
      <div class="panel__header">
        <span class="panel__badge panel__badge--best">&#10003; {{ 'sections.httpClientGenerics.panels.best' | translate }}</span>
        <span class="panel__lang">TypeScript</span>
      </div>
      <pre class="code-block" [innerHTML]="codeBest"></pre>
    </div>
  </div>
</section>
